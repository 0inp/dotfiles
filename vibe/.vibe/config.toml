theme = "nord"
default_agent = "plan"
# Shared skills with Claude Code — see ~/.claude/skills (symlinked from ~/dotfiles/claude/.claude/skills)
skill_paths = ["/Users/oinp/.claude/skills"]

[tools.bash]
allowlist = [
  "/Users/oinp/dotfiles/vibe/.vibe/*",
  "/Users/oinp/dotfiles/vibe/.vibe/plans/*",
  "cat",
  "find",
  "head",
  "ls",
  "mkdir",
  "touch",
  "xargs",
]

[[models]]
name = "mistral-large-latest"
provider = "mistral"
alias = "mistral-large"
thinking = "off"
