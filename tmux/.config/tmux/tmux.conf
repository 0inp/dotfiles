# Options
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -gq allow-passthrough on

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g history-limit 1000000     # increase history size (from 2,000)
set-option -g renumber-windows on       # renumber all windows when any window is closed
set -g repeat-time 1000  # increase "prefix-free" window
set -g set-clipboard on          # use system clipboard
setw -g mode-keys vi
setw -g automatic-rename on
set -g mouse on

set-option -g prefix C-b
set-option -g prefix2 none

# Theme: colors
gray_light="#dcd7ba"
gray_medium="#727169"
gray_dark="#16161d"
green_soft="#8a9a7b"
blue_muted="#7e9cd8"
cyan_soft="#6a9589"

# Theme: status
set -g status-left " "
set -g status-position top
set -g status-right "#(bash /Users/oinp/dotfiles/tmux/.config/tmux/scripts/tmux_git_status.sh #{pane_current_path}) | #[fg=${green_soft},bold]#S "
set -g status-style "bg=default" 
set -g window-status-style "fg=${gray_light}"

# Theme: borders
set -g pane-border-lines single
set -g pane-border-style "fg=${gray_dark}"
set -g pane-active-border-style "fg=${gray_medium}"

# Theme: status (windows)
set -g window-status-format " #I:#W"
set -g window-status-current-format "#{?window_zoomed_flag,#[fg=${green_soft}],#[fg=${cyan_soft}]}#[bold]  ● #[underscore]#I:#W"
set -g window-status-current-style "fg=${cyan_soft}"

# Key bindings
unbind r
bind r command-prompt "rename-window %%"

bind -r -T prefix , resize-pane -L 20
bind -r -T prefix . resize-pane -R 20
bind -r -T prefix = resize-pane -D 7
bind -r -T prefix + resize-pane -U 7

bind R source-file ~/.config/tmux/tmux.conf ; display "Config reloaded !"

unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# disable kill accept prompt
bind-key x kill-pane

unbind v
bind v copy-mode
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

# Sesh keybinds
# sesh w/ gum dir selector
bind-key "K" display-popup -E -w 40% "sesh connect \"$(
    sesh list -i | gum filter --no-strip-ansi --limit 1 --placeholder 'Pick session' --prompt='🛸 '
)\""

# sesh w/ (tmux fzf)
bind-key "T" run-shell "sesh connect \"$(
        sesh list --icons | fzf-tmux -p 90%,80% \
        --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
        --header '🔑 ^a all | ^t tmux | ^g conf | ^x zoxide | ^d tmux kill | ^f find' \
        --bind 'tab:down,btab:up' \
        --bind 'ctrl-a:change-prompt(🛸  )+reload(sesh list --icons)' \
        --bind 'ctrl-t:change-prompt(◧  )+reload(sesh list -t --icons)' \
        --bind 'ctrl-g:change-prompt(⛯  )+reload(sesh list -c --icons)' \
        --bind 'ctrl-x:change-prompt(🗃  )+reload(sesh list -z --icons)' \
        --bind 'ctrl-f:change-prompt(🔭  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
        --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(👽  )+reload(sesh list --icons)' \
        --preview-window 'right:55%' \
        --preview 'sesh preview {}'
)\""
bind-key N command-prompt "new-session -s '%%'"

# tmux display popups
bind-key C-y display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "yazi" # yazi float
bind-key C-g display-popup -d "#{pane-current-path}" -w 90% -h 90% -E "lazygit" # lazygit float
bind d display-menu -T "#[align=centre]Config" -x C -y C \
    ".zshrc"            z  "display-popup -w 85% -h 85% -E 'nvim ~/dotfiles/zsh/.zshrc'" \
    ".tmux.conf"        t  "display-popup -w 85% -h 85% -E 'nvim ~/.tmux.conf'" \
    ".nvim"             v  "display-popup -d "~/dotfiles/nvim/.config/nvim" -E 'nvim ~/dotfiles/nvim/.config/nvim/init.lua'" \
    "quit"              q  ""

# Drag copy using mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# tmux plugin manager 
set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/.config/tmux/.tmux/plugins
set -g @plugin 'tmux-plugins/tpm' # must be the first plugin
set -g @plugin "christoomey/vim-tmux-navigator"

set -g @plugin "tmux-plugins/tmux-resurrect" # persist tmux sessions after computer restart
set -g @plugin "tmux-plugins/tmux-continuum" # automatically save sessions every 15mins

set -g @resurrect-capture-pane-contents "on"
set -g @continuum-restore "on"

run '~/.config/tmux/.tmux/plugins/tpm/tpm' # always keep this line last
